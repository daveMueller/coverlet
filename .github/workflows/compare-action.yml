name: Action
on: [push]
jobs:
  Explore-GitHub-Actions:
    runs-on: windows-latest
    steps:
      - name: Checkout refit
        uses: actions/checkout@v2
        with:
          repository: reactiveui/refit
          path: refit
      - name: Checkout coverlet
        uses: actions/checkout@v2
        with:
          path: coverlet  
      - name: Setup .NET Core SDK 2.1.x
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: '2.1.x'
      - name: Setup .NET Core SDK 3.1.x
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: '3.1.x'
      - name: Setup .NET Core SDK 5.0.x
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: '5.0.x'
          include-prerelease: true  
      - name: Generate first refit report
        working-directory: refit
        run: | 
          git fetch --prune --unshallow
          dotnet build
          dotnet test --framework net5.0 --no-build --collect:"XPlat Code Coverage"
      - name: ReportGenerator
        uses: danielpalme/ReportGenerator-GitHub-Action@4.8.9
        with:
          reports: 'refit\Refit.Tests\TestResults\*\coverage.cobertura.xml' # REQUIRED # The coverage reports that should be parsed (separated by semicolon). Globbing is supported.
          targetdir: 'coveragereport' # REQUIRED # The directory where the generated report should be saved.
          reporttypes: 'HtmlInline;Cobertura' # The output formats and scope (separated by semicolon) Values: Badges, Clover, Cobertura, CsvSummary, Html, HtmlChart, HtmlInline, HtmlInline_AzurePipelines, HtmlInline_AzurePipelines_Dark, HtmlSummary, JsonSummary, Latex, LatexSummary, lcov, MHtml, PngChart, SonarQube, TeamCitySummary, TextSummary, Xml, XmlSummary
          toolpath: 'reportgeneratortool' # Default directory for installing the dotnet tool.          
      - name: Pack coverlet master
        working-directory: coverlet
        run: |
          git fetch --prune --unshallow
          dotnet pack -c Release
      - name: Generate second refit report
        working-directory: refit
        run: | 
          dotnet add package coverlet.collector --package-directory ../coverlet/bin/Release/Packages
          dotnet clean
          dotnet build
          dotnet test --framework net5.0 --no-build --collect:"XPlat Code Coverage"
      - uses: actions/upload-artifact@v2
        with:
          name: artifacts
          path: refit\Refit.Tests\TestResults\*\coverage.cobertura.xml